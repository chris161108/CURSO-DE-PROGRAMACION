<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Inventario</title>
</head>
<body>
    <table border="1">
        <tr>
            <th colspan="4">Inventario de Productos</th>
        </tr>
        <tr>
            <th>Categoría</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
        </tr>
        <tr>
            <td rowspan="2">Electrónica</td>
            <td>Smartphone</td>
            <td>50</td>
            <td>$300</td>
        </tr>
        <tr>
            <td>Laptop</td>
            <td>30</td>
            <td>$800</td>
        </tr>
        <tr>
            <td rowspan="2">Hogar</td>
            <td>Aspiradora</td>
            <td>20</td>
            <td>$150</td>
        </tr>
        <tr>
            <td>Microondas</td>
            <td>15</td>
            <td>$100</td>
        </tr>

    </table>
   
        
</body>
</html>
