<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reserva de vuelo</title>
</head>
<body>
    <form>
        <label for="fecha">Fecha de vuelo:</label>
        <input type="date" id="fecha" name="fecha" min="2026-06-01" required><br><br>

        <label for="pasajeros">Número de pasajeros:</label>
        <input type="number" id="pasajeros" name="pasajeros" min="1" max="5" required><br><br>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email" required><br><br>

        <input type="submit" value="Reservar">
    </form>
    
</body>
</html>
